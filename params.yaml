data:
  processed_path: data/processed/data.parquet
  test_size: 0.2
  random_state: 42
  target_column: academic_work_performance
  features:
    - age
    - gender
    - daily_gaming_hours
    - game_genre
    - primary_game
    - gaming_platform
    - sleep_hours
    - sleep_quality
    - sleep_disruption_frequency
    - face_to_face_social_hours_weekly

train:
  model: xgboost
  experiment_name: gaming-mental-health

random_forest:
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  class_weight: balanced
  n_jobs: -1

knn:
  n_neighbors: 7
  weights: uniform
  metric: minkowski

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  eval_metric: mlogloss

mlflow:
  tracking_uri: http://localhost:5050
  model_artifact_path: model

output:
  models_dir: models/
  metrics_dir: metrics/
