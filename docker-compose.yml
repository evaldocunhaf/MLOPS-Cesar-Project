version: '3.8'
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    ports:
      - "5050:5000"
    volumes:
      - ./mlflow-docker/mlruns:/mlruns
      - ./mlflow-docker/mlartifacts:/mlartifacts
    command: >
      mlflow server
      --backend-store-uri file:///mlruns
      --default-artifact-root file:///mlartifacts
      --artifacts-destination file:///mlartifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    restart: always

volumes:
  mlruns:
  mlartifacts:
