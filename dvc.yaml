stages:
  extract:
    cmd: python extract.py
    deps:
      - extract.py
      - extract/
    outs:
      - data/raw/Gaming and Mental Health.csv

  preprocess:
    cmd: python transform.py
    deps:
      - data/raw/Gaming and Mental Health.csv
      - transform.py
      - transformer/
    outs:
      - data/processed/data.parquet